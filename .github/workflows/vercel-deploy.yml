name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ IMPORTANT: force Git author to be YOU (not Copilot)
      - name: Set Git author
        run: |
          git config --global user.name "3DY"
          git config --global user.email "3@edy.chat"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend/web
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Debug - Check current directory and files
        run: |
          echo "Current directory:"
          pwd
          echo "Files in current directory:"
          ls -la
          echo "Files in frontend/web directory:"
          ls -la frontend/web/
          echo "Package.json location:"
          find . -name "package.json" -type f

      - name: Create Vercel project config
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json << EOF
          {
            "orgId": "${{ secrets.VERCEL_ORG_ID }}",
            "projectId": "${{ secrets.VERCEL_PROJECT_ID }}"
          }
          EOF

      - name: Deploy with Vercel CLI from repo root
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy \
            --prod \
            --yes \
            --token=$VERCEL_TOKEN
